basePath: /
definitions:
  ai.DependentDraft:
    properties:
      monthly_cost:
        type: number
      name:
        type: string
      relationship:
        type: string
    type: object
  ai.IncomeStreamDraft:
    properties:
      amount:
        type: number
      is_passive:
        type: boolean
      name:
        type: string
      type:
        type: string
    type: object
  ai.LifeEventAnalysisResult:
    properties:
      ai_impact_analysis:
        type: string
      category:
        type: string
      dependents_to_add:
        items:
          $ref: '#/definitions/ai.DependentDraft'
        type: array
      expense_impact:
        type: number
      income_impact:
        type: number
      income_streams_to_add:
        items:
          $ref: '#/definitions/ai.IncomeStreamDraft'
        type: array
      new_marital_status:
        type: string
      new_risk_score:
        type: integer
      new_risk_tolerance:
        type: string
    type: object
  model.Asset:
    properties:
      avg_price:
        type: number
      category:
        $ref: '#/definitions/model.AssetCategory'
      cost_basis:
        type: number
      created_at:
        type: string
      current_price:
        type: number
      current_value:
        type: number
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      notes:
        type: string
      quantity:
        type: number
      ticker:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  model.AssetCategory:
    enum:
    - cash
    - deposit
    - gold
    - stock
    - fund
    - crypto
    - real_estate
    type: string
    x-enum-varnames:
    - AssetCategoryCash
    - AssetCategoryDeposit
    - AssetCategoryGold
    - AssetCategoryStock
    - AssetCategoryFund
    - AssetCategoryCrypto
    - AssetCategoryRealEstate
  model.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/model.User'
    type: object
  model.ChatMessage:
    properties:
      content:
        description: The text content
        type: string
      role:
        description: '"user" or "assistant"'
        type: string
    type: object
  model.ConfirmEventRequest:
    properties:
      ai_impact_analysis:
        type: string
      category:
        type: string
      dependents_to_add:
        items:
          properties:
            monthly_cost:
              type: number
            name:
              type: string
            relationship:
              type: string
          type: object
        type: array
      event_text:
        type: string
      expense_impact:
        type: number
      income_impact:
        type: number
      income_streams_to_add:
        items:
          properties:
            amount:
              type: number
            is_passive:
              type: boolean
            name:
              type: string
            type:
              type: string
          type: object
        type: array
      new_marital_status:
        type: string
      new_risk_score:
        type: integer
      new_risk_tolerance:
        type: string
      title:
        type: string
    type: object
  model.CreateAssetRequest:
    properties:
      avg_price:
        type: number
      category:
        $ref: '#/definitions/model.AssetCategory'
      cost_basis:
        type: number
      current_price:
        type: number
      current_value:
        type: number
      name:
        type: string
      notes:
        type: string
      quantity:
        type: number
      ticker:
        type: string
    required:
    - category
    - current_value
    - name
    type: object
  model.CreateDependentRequest:
    properties:
      date_of_birth:
        type: string
      monthly_cost:
        minimum: 0
        type: number
      name:
        type: string
      notes:
        type: string
      relationship:
        type: string
    required:
    - name
    - relationship
    type: object
  model.CreateIncomeStreamRequest:
    properties:
      amount:
        type: number
      frequency:
        description: e.g., "monthly", "yearly"
        type: string
      is_passive:
        type: boolean
      name:
        type: string
      notes:
        type: string
      type:
        type: string
    required:
    - amount
    - name
    - type
    type: object
  model.CreateLiabilityRequest:
    properties:
      category:
        $ref: '#/definitions/model.LiabilityCategory'
      interest_rate:
        type: number
      lender:
        type: string
      monthly_payment:
        type: number
      name:
        type: string
      notes:
        type: string
      remaining_balance:
        type: number
    required:
    - category
    - name
    - remaining_balance
    type: object
  model.Dependent:
    properties:
      added_date:
        type: string
      created_at:
        type: string
      date_of_birth:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      monthly_cost:
        type: number
      name:
        type: string
      notes:
        type: string
      relationship:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  model.GoogleLoginRequest:
    properties:
      id_token:
        type: string
    required:
    - id_token
    type: object
  model.IncomeStream:
    properties:
      amount:
        type: number
      created_at:
        type: string
      end_date:
        type: string
      frequency:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      is_passive:
        type: boolean
      name:
        type: string
      notes:
        type: string
      start_date:
        type: string
      type:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  model.InvestmentPolicy:
    properties:
      created_at:
        type: string
      detailed_strategy:
        type: string
      id:
        type: string
      is_ai_recommended:
        type: boolean
      profile_version:
        type: integer
      status:
        description: '''draft'', ''active'', ''superseded'''
        type: string
      target_allocation:
        type: object
      trigger_event_id:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      version:
        type: integer
    type: object
  model.InvestmentThesis:
    properties:
      catalysts:
        items:
          type: string
        type: array
      company_name:
        type: string
      conviction_score:
        description: 1-10
        type: integer
      created_at:
        type: string
      fair_value:
        type: number
      id:
        type: string
      initial_date:
        type: string
      key_metrics:
        type: object
      last_reviewed:
        type: string
      margin_of_safety:
        type: number
      moat:
        description: Array of strings or complex objects
        items:
          type: string
        type: array
      notes:
        type: string
      quality_score:
        description: 1-10
        type: integer
      risks:
        items:
          type: string
        type: array
      sell_conditions:
        items:
          type: string
        type: array
      status:
        description: active, archived, sold
        type: string
      thesis_detail:
        type: string
      thesis_summary:
        type: string
      ticker:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      valuation_score:
        description: 1-10
        type: integer
      version:
        type: integer
      why_i_own:
        type: string
    type: object
  model.InvestorProfile:
    properties:
      created_at:
        type: string
      date_of_birth:
        type: string
      discretionary_monthly_expense:
        type: number
      essential_monthly_expense:
        type: number
      fi_target_amount:
        type: number
      id:
        type: string
      marital_status:
        type: string
      risk_score:
        type: integer
      risk_tolerance:
        type: string
      status:
        description: active, superseded
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      version:
        type: integer
    type: object
  model.Liability:
    properties:
      category:
        $ref: '#/definitions/model.LiabilityCategory'
      created_at:
        type: string
      id:
        type: string
      interest_rate:
        type: number
      is_active:
        type: boolean
      lender:
        type: string
      monthly_payment:
        type: number
      name:
        type: string
      notes:
        type: string
      remaining_balance:
        type: number
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  model.LiabilityCategory:
    enum:
    - mortgage
    - auto_loan
    - student_loan
    - credit_card
    - personal_loan
    - other
    type: string
    x-enum-varnames:
    - LiabilityCategoryMortgage
    - LiabilityCategoryAutoLoan
    - LiabilityCategoryStudentLoan
    - LiabilityCategoryCreditCard
    - LiabilityCategoryPersonalLoan
    - LiabilityCategoryOther
  model.LifeEvent:
    properties:
      ai_impact_analysis:
        type: string
      category:
        description: Uses life_event_category enum
        type: string
      created_at:
        type: string
      event_date:
        type: string
      expense_impact:
        type: number
      id:
        type: string
      income_impact:
        type: number
      requires_ips_update:
        type: boolean
      title:
        type: string
      triggered_ips_version:
        type: integer
      triggered_profile_version:
        type: integer
      user_id:
        type: string
    type: object
  model.LogEventRequest:
    properties:
      event_text:
        type: string
    type: object
  model.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  model.NetWorthSummary:
    properties:
      base_currency:
        type: string
      net_worth:
        type: number
      total_assets:
        type: number
      total_liabilities:
        type: number
    type: object
  model.Notification:
    properties:
      action_link:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_read:
        type: boolean
      message:
        type: string
      title:
        type: string
      type:
        type: string
      user_id:
        type: string
    type: object
  model.OnboardingRequest:
    properties:
      chat_history:
        items:
          $ref: '#/definitions/model.ChatMessage'
        type: array
    type: object
  model.PaginatedAssets:
    properties:
      data:
        items:
          $ref: '#/definitions/model.Asset'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  model.PaginatedLiabilities:
    properties:
      data:
        items:
          $ref: '#/definitions/model.Liability'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  model.SignupRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  model.ThesisGenerationRequest:
    properties:
      asset_type:
        description: stock, real_estate, crypto, etc.
        type: string
      company_name:
        type: string
      ticker:
        type: string
      user_provided_context:
        type: string
    required:
    - asset_type
    - company_name
    - ticker
    type: object
  model.UpdateAssetRequest:
    properties:
      avg_price:
        type: number
      category:
        $ref: '#/definitions/model.AssetCategory'
      cost_basis:
        type: number
      current_price:
        type: number
      current_value:
        type: number
      name:
        type: string
      notes:
        type: string
      quantity:
        type: number
      ticker:
        type: string
    required:
    - category
    - current_value
    - name
    type: object
  model.UpdateDependentRequest:
    properties:
      date_of_birth:
        type: string
      is_active:
        type: boolean
      monthly_cost:
        minimum: 0
        type: number
      name:
        type: string
      notes:
        type: string
      relationship:
        type: string
    required:
    - name
    - relationship
    type: object
  model.UpdateIncomeStreamRequest:
    properties:
      amount:
        type: number
      frequency:
        type: string
      is_active:
        type: boolean
      is_passive:
        type: boolean
      name:
        type: string
      notes:
        type: string
      type:
        type: string
    required:
    - amount
    - name
    - type
    type: object
  model.UpdateLiabilityRequest:
    properties:
      category:
        $ref: '#/definitions/model.LiabilityCategory'
      interest_rate:
        type: number
      lender:
        type: string
      monthly_payment:
        type: number
      name:
        type: string
      notes:
        type: string
      remaining_balance:
        type: number
    required:
    - category
    - name
    - remaining_balance
    type: object
  model.UpdateProfileRequest:
    properties:
      date_of_birth:
        type: string
      discretionary_monthly_expense:
        type: number
      essential_monthly_expense:
        type: number
      fi_target_amount:
        type: number
      marital_status:
        type: string
      risk_score:
        type: integer
      risk_tolerance:
        type: string
    type: object
  model.User:
    properties:
      auth_provider:
        type: string
      base_currency:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  model.WatchlistItem:
    properties:
      added_date:
        type: string
      ai_alert:
        type: string
      company_name:
        type: string
      created_at:
        type: string
      current_price:
        type: number
      fair_value:
        type: number
      id:
        type: string
      last_ai_check:
        type: string
      notes:
        type: string
      priority:
        description: 1-10 (higher is higher priority)
        type: integer
      quality_score:
        type: integer
      status:
        description: watching, bought, dropped
        type: string
      target_price:
        type: number
      thesis_id:
        description: Nullable
        type: string
      ticker:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API server for Personal Wealth Operating System.
  title: Life Capital (WealthOS) API
  version: "1.0"
paths:
  /api/v1/auth/google:
    post:
      consumes:
      - application/json
      description: Authenticate using Google ID Token.
      parameters:
      - description: Google ID Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.GoogleLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.AuthResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Google Login
      tags:
      - auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Login using Email and Password.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.AuthResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Local Account Login
      tags:
      - auth
  /api/v1/auth/me:
    get:
      consumes:
      - application/json
      description: Get current account information via JWT Token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.User'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Account Information
      tags:
      - auth
  /api/v1/auth/signup:
    post:
      consumes:
      - application/json
      description: Register a new user using Email and Password.
      parameters:
      - description: Signup information
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.SignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Local Account Signup
      tags:
      - auth
  /api/v1/cashflow/dependents:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Dependent'
            type: array
      security:
      - Bearer: []
      summary: Get all dependents
      tags:
      - Cashflow
    post:
      consumes:
      - application/json
      parameters:
      - description: Dependent info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreateDependentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Dependent'
      security:
      - Bearer: []
      summary: Create a dependent
      tags:
      - Cashflow
  /api/v1/cashflow/dependents/{id}:
    delete:
      parameters:
      - description: Dependent ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - Bearer: []
      summary: Delete a dependent
      tags:
      - Cashflow
    put:
      consumes:
      - application/json
      parameters:
      - description: Dependent ID
        in: path
        name: id
        required: true
        type: string
      - description: Dependent info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.UpdateDependentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Dependent'
      security:
      - Bearer: []
      summary: Update a dependent
      tags:
      - Cashflow
  /api/v1/cashflow/income:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.IncomeStream'
            type: array
      security:
      - Bearer: []
      summary: Get all income streams
      tags:
      - Cashflow
    post:
      consumes:
      - application/json
      parameters:
      - description: Income Stream info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreateIncomeStreamRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.IncomeStream'
      security:
      - Bearer: []
      summary: Create an income stream
      tags:
      - Cashflow
  /api/v1/cashflow/income/{id}:
    delete:
      parameters:
      - description: Income ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - Bearer: []
      summary: Delete an income stream
      tags:
      - Cashflow
    put:
      consumes:
      - application/json
      parameters:
      - description: Income ID
        in: path
        name: id
        required: true
        type: string
      - description: Income Stream info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.UpdateIncomeStreamRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.IncomeStream'
      security:
      - Bearer: []
      summary: Update an income stream
      tags:
      - Cashflow
  /api/v1/health:
    get:
      description: Check backend health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health Check
      tags:
      - system
  /api/v1/ips/generate:
    post:
      consumes:
      - application/json
      description: Let AI analyze current profile and assets to generate a new IPS
        strategy
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.InvestmentPolicy'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Generate IPS via AI
      tags:
      - IPS
  /api/v1/ips/latest:
    get:
      consumes:
      - application/json
      description: Retrieve the latest Investment Policy Statement for the authenticated
        user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.InvestmentPolicy'
      security:
      - BearerAuth: []
      summary: Get latest IPS
      tags:
      - IPS
    put:
      consumes:
      - application/json
      description: Update the current Investment Policy Statement
      parameters:
      - description: Updated Policy
        in: body
        name: policy
        required: true
        schema:
          $ref: '#/definitions/model.InvestmentPolicy'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update IPS
      tags:
      - IPS
  /api/v1/notifications:
    get:
      consumes:
      - application/json
      description: Retrieve a list of notifications for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Notification'
            type: array
      security:
      - BearerAuth: []
      summary: Get user notifications
      tags:
      - Notifications
  /api/v1/notifications/{id}/read:
    put:
      consumes:
      - application/json
      description: Mark a specific notification as read for the authenticated user
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Mark a notification as read
      tags:
      - Notifications
  /api/v1/notifications/unread-count:
    get:
      consumes:
      - application/json
      description: Get the number of unread notifications for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
