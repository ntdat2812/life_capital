basePath: /
definitions:
  model.Asset:
    properties:
      avg_price:
        type: number
      category:
        $ref: '#/definitions/model.AssetCategory'
      cost_basis:
        type: number
      created_at:
        type: string
      current_price:
        type: number
      current_value:
        type: number
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      notes:
        type: string
      quantity:
        type: number
      ticker:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  model.AssetCategory:
    enum:
    - cash
    - deposit
    - gold
    - stock
    - fund
    - crypto
    - real_estate
    type: string
    x-enum-varnames:
    - AssetCategoryCash
    - AssetCategoryDeposit
    - AssetCategoryGold
    - AssetCategoryStock
    - AssetCategoryFund
    - AssetCategoryCrypto
    - AssetCategoryRealEstate
  model.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/model.User'
    type: object
  model.ChatMessage:
    properties:
      content:
        description: The text content
        type: string
      role:
        description: '"user" or "assistant"'
        type: string
    type: object
  model.CreateAssetRequest:
    properties:
      avg_price:
        type: number
      category:
        $ref: '#/definitions/model.AssetCategory'
      cost_basis:
        type: number
      current_price:
        type: number
      current_value:
        type: number
      name:
        type: string
      notes:
        type: string
      quantity:
        type: number
      ticker:
        type: string
    required:
    - category
    - current_value
    - name
    type: object
  model.CreateLiabilityRequest:
    properties:
      category:
        $ref: '#/definitions/model.LiabilityCategory'
      interest_rate:
        type: number
      lender:
        type: string
      monthly_payment:
        type: number
      name:
        type: string
      notes:
        type: string
      remaining_balance:
        type: number
    required:
    - category
    - name
    - remaining_balance
    type: object
  model.GoogleLoginRequest:
    properties:
      id_token:
        type: string
    required:
    - id_token
    type: object
  model.InvestorProfile:
    properties:
      created_at:
        type: string
      date_of_birth:
        type: string
      fi_target_amount:
        type: number
      id:
        type: string
      life_constraints:
        additionalProperties: true
        type: object
      marital_status:
        type: string
      risk_score:
        type: integer
      risk_tolerance:
        type: string
      status:
        description: active, superseded
        type: string
      total_monthly_expense:
        type: number
      total_monthly_income:
        type: number
      updated_at:
        type: string
      user_id:
        type: string
      version:
        type: integer
    type: object
  model.Liability:
    properties:
      category:
        $ref: '#/definitions/model.LiabilityCategory'
      created_at:
        type: string
      id:
        type: string
      interest_rate:
        type: number
      is_active:
        type: boolean
      lender:
        type: string
      monthly_payment:
        type: number
      name:
        type: string
      notes:
        type: string
      remaining_balance:
        type: number
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  model.LiabilityCategory:
    enum:
    - mortgage
    - auto_loan
    - student_loan
    - credit_card
    - personal_loan
    - other
    type: string
    x-enum-varnames:
    - LiabilityCategoryMortgage
    - LiabilityCategoryAutoLoan
    - LiabilityCategoryStudentLoan
    - LiabilityCategoryCreditCard
    - LiabilityCategoryPersonalLoan
    - LiabilityCategoryOther
  model.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  model.NetWorthSummary:
    properties:
      base_currency:
        type: string
      net_worth:
        type: number
      total_assets:
        type: number
      total_liabilities:
        type: number
    type: object
  model.OnboardingRequest:
    properties:
      chat_history:
        items:
          $ref: '#/definitions/model.ChatMessage'
        type: array
    type: object
  model.PaginatedAssets:
    properties:
      data:
        items:
          $ref: '#/definitions/model.Asset'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  model.PaginatedLiabilities:
    properties:
      data:
        items:
          $ref: '#/definitions/model.Liability'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  model.SignupRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  model.UpdateAssetRequest:
    properties:
      avg_price:
        type: number
      category:
        $ref: '#/definitions/model.AssetCategory'
      cost_basis:
        type: number
      current_price:
        type: number
      current_value:
        type: number
      name:
        type: string
      notes:
        type: string
      quantity:
        type: number
      ticker:
        type: string
    required:
    - category
    - current_value
    - name
    type: object
  model.UpdateLiabilityRequest:
    properties:
      category:
        $ref: '#/definitions/model.LiabilityCategory'
      interest_rate:
        type: number
      lender:
        type: string
      monthly_payment:
        type: number
      name:
        type: string
      notes:
        type: string
      remaining_balance:
        type: number
    required:
    - category
    - name
    - remaining_balance
    type: object
  model.User:
    properties:
      auth_provider:
        type: string
      base_currency:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API server for Personal Wealth Operating System.
  title: Life Capital (WealthOS) API
  version: "1.0"
paths:
  /api/v1/auth/google:
    post:
      consumes:
      - application/json
      description: Authenticate using Google ID Token.
      parameters:
      - description: Google ID Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.GoogleLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.AuthResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Google Login
      tags:
      - auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Login using Email and Password.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.AuthResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Local Account Login
      tags:
      - auth
  /api/v1/auth/me:
    get:
      consumes:
      - application/json
      description: Get current account information via JWT Token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.User'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Account Information
      tags:
      - auth
  /api/v1/auth/signup:
    post:
      consumes:
      - application/json
      description: Register a new user using Email and Password.
      parameters:
      - description: Signup information
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.SignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Local Account Signup
      tags:
      - auth
  /api/v1/health:
    get:
      description: Check backend health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health Check
      tags:
      - system
  /api/v1/profile/me:
    get:
      consumes:
      - application/json
      description: Get the current active investor profile for the logged in user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.InvestorProfile'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get Active Profile
      tags:
      - profile
  /api/v1/profile/onboarding:
    post:
      consumes:
      - application/json
      description: Submit the 8-step chat history to let AI analyze and create an
        Investor Profile.
      parameters:
      - description: Chat history data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.OnboardingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.InvestorProfile'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Submit AI Onboarding Interview
      tags:
      - profile
  /api/v1/wealth/assets:
    get:
      parameters:
      - description: Category filter
        in: query
        name: category
        type: string
      - description: Limit for pagination
        in: query
        name: limit
        type: integer
      - description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedAssets'
      security:
      - Bearer: []
      summary: Get all assets for current user
      tags:
      - Wealth
    post:
      consumes:
      - application/json
      parameters:
      - description: Asset info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreateAssetRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Asset'
      security:
      - Bearer: []
      summary: Create a new asset
      tags:
      - Wealth
  /api/v1/wealth/assets/{id}:
    delete:
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - Bearer: []
      summary: Delete an asset
      tags:
      - Wealth
    put:
      consumes:
      - application/json
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Asset info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.UpdateAssetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Asset'
      security:
      - Bearer: []
      summary: Update an asset
      tags:
      - Wealth
  /api/v1/wealth/liabilities:
    get:
      parameters:
      - description: Category filter
        in: query
        name: category
        type: string
      - description: Limit for pagination
        in: query
        name: limit
        type: integer
      - description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedLiabilities'
      security:
      - Bearer: []
      summary: Get all liabilities for current user
      tags:
      - Wealth
    post:
      consumes:
      - application/json
      parameters:
      - description: Liability info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreateLiabilityRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Liability'
      security:
      - Bearer: []
      summary: Create a new liability
      tags:
      - Wealth
  /api/v1/wealth/liabilities/{id}:
    delete:
      parameters:
      - description: Liability ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - Bearer: []
      summary: Delete a liability
      tags:
      - Wealth
    put:
      consumes:
      - application/json
      parameters:
      - description: Liability ID
        in: path
        name: id
        required: true
        type: string
      - description: Liability info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.UpdateLiabilityRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Liability'
      security:
      - Bearer: []
      summary: Update a liability
      tags:
      - Wealth
  /api/v1/wealth/net-worth:
    get:
      consumes:
      - application/json
      description: Get total assets, total liabilities and net worth for the current
        user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.NetWorthSummary'
      security:
      - Bearer: []
      summary: Get net worth summary
      tags:
      - Wealth
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
